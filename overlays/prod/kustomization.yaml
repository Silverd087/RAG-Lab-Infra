apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml
  - hpa.yaml

images:
- name: ghcr.io/silverd087/raglab-frontend
  newTag: latest
- name: ghcr.io/silverd087/raglab-backend
  newTag: latest


secretGenerator:
  - name: rag-infra-secret
    envs: [infra-secret.env]
  - name: rag-app-secret
    envs: [app-secret.env]


namespace: production
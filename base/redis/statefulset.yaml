apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  updateStrategy:
    type: RollingUpdate     
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumes:
        - name: data
          persistentVolumeClaim: redis-pvc
        volumeMounts:
        - name: data
          mountPath: /data

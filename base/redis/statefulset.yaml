apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels: {app: redis}
  updateStrategy:
    type: RollingUpdate     
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        envFrom:
        - configMapRef:
            name: rag-common-config
        - secretRef:
            name: rag-infra-secret
        volumeMounts:
        - name: data
          mountPath: /data
        startupProbe:
          exec:
            command: ["CMD", "redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command: ["CMD", "redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
      volumes:
      - name: data
        persistentVolumeClaim: 
          claimName: redis-pvc


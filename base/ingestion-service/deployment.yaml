apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels: {app: ingestion-service}
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
      - name: ingestion-service
        image: ghcr.io/silverd087/raglab-backend
        command: ["celery", "-A", "src.celery_app", "worker", "--queues", "ingestion", "--concurrency", "2"]
        envFrom:
        - configMapRef:
            name: rag-common-config
        - secretRef:
            name: rag-infra-secret
        - secretRef:
            name: rag-app-secret
        startupProbe:
          exec:
            command: ["bash", "-c", "celery -A src.celery_app inspect ping -d celery@$HOSTNAME"]          
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 8
        readinessProbe:
          exec:
            command: ["bash", "-c", "celery -A src.celery_app inspect ping -d celery@$HOSTNAME"]          
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 8
          failureThreshold: 3
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 256Mi
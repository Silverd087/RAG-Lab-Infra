apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
spec:
  replicas: 1
  selector:
    matchlabels: {app: rag-service}
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
      - name: rag-service
        image: 
        ports:
          - containerPort: 8000
        envFrom:
        - configMapRef:
          name: rag-service-config
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: {app: minio}
  updateStrategy:
    type: RollingUpdate     
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        ports:
        - containerPort: 9000
        - containerPort: 9001
        args: ["server", "/data", "--console-address", ":9001"]
        envFrom:
        - configMapRef:
            name: rag-common-config
        - secretRef:
            name: rag-infra-secret
        volumeMounts:
        - name: data
          mountPath: /data
        startupProbe:
          bash:
            command: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          bash:
            command: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
      volumes:
      - name: data
        persistentVolumeClaim: 
          claimName: minio-pvc

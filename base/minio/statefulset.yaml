apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels: {app: minio}
  updateStrategy:
    type: RollingUpdate     
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        ports:
        - containerPort: 9000
        - containerPort: 9001
        volumes:
        - name: data
          persistentVolumeClaim: minio-pvc
        volumeMounts:
        - name: data
          mountPath: /data
        command: server /data --console-address ":9001"
